<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">インバウンド商品の収益設計</title>
  <desc id="desc">顧客価値、利益、在庫、取消条件を一枚でつなぐ商品設計のグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ecfeff"/><stop offset=".55" stop-color="#e8fff6"/><stop offset="1" stop-color="#fefce8"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#020617" flood-opacity=".32"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1090" cy="80" r="190" fill="none" stroke="#0f766e" stroke-opacity=".09" stroke-width="58"/>
  <circle cx="100" cy="650" r="160" fill="#0ea5e9" fill-opacity=".09"/>
  <text x="70" y="84" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="5">PRODUCT ECONOMICS</text>
  <text x="70" y="170" fill="#123b44" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="45" font-weight="700">価値・利益・在庫・取消を</text>
  <text x="70" y="232" fill="#123b44" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="45" font-weight="700">一枚の商品設計へ</text>
  <text x="70" y="322" fill="#315f65" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25" font-weight="700">価値 → 利益 → 在庫 → 販売条件</text>
  <g transform="translate(70 375)">
    <rect width="560" height="68" rx="34" fill="#0f766e" fill-opacity=".09"/>
    <text x="30" y="43" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">1予約当たりに残る金額で判断</text>
  </g>
  <g transform="translate(695 94)" filter="url(#shadow)">
    <rect width="410" height="492" rx="30" fill="#f8fafc"/>
    <text x="205" y="53" text-anchor="middle" fill="#0f172a" font-family="Segoe UI, sans-serif" font-size="16" font-weight="800" letter-spacing="2">ONE-PAGE DESIGN</text>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif">
      <g transform="translate(34 86)">
        <rect width="342" height="78" rx="17" fill="#ccfbf1"/>
        <circle cx="39" cy="39" r="22" fill="#0f766e"/><text x="39" y="47" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">1</text>
        <text x="78" y="34" fill="#134e4a" font-size="18" font-weight="700">顧客価値</text>
        <text x="78" y="57" fill="#475569" font-size="14">誰の、どの旅行時間を変えるか</text>
      </g>
      <path d="M205 166v18" stroke="#14b8a6" stroke-width="5" stroke-linecap="round"/>
      <g transform="translate(34 184)">
        <rect width="342" height="78" rx="17" fill="#e0f2fe"/>
        <circle cx="39" cy="39" r="22" fill="#0369a1"/><text x="39" y="47" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">2</text>
        <text x="78" y="34" fill="#0c4a6e" font-size="18" font-weight="700">利益と価格</text>
        <text x="78" y="57" fill="#475569" font-size="14">手数料・変動費・必要利益を逆算</text>
      </g>
      <path d="M205 264v18" stroke="#0ea5e9" stroke-width="5" stroke-linecap="round"/>
      <g transform="translate(34 282)">
        <rect width="342" height="78" rx="17" fill="#fef3c7"/>
        <circle cx="39" cy="39" r="22" fill="#d97706"/><text x="39" y="47" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">3</text>
        <text x="78" y="34" fill="#78350f" font-size="18" font-weight="700">在庫と手仕舞い</text>
        <text x="78" y="57" fill="#475569" font-size="14">品質を保てる枠を販売可能にする</text>
      </g>
      <path d="M205 362v18" stroke="#f59e0b" stroke-width="5" stroke-linecap="round"/>
      <g transform="translate(34 380)">
        <rect width="342" height="78" rx="17" fill="#fee2e2"/>
        <circle cx="39" cy="39" r="22" fill="#dc2626"/><text x="39" y="47" text-anchor="middle" fill="#fff" font-size="22" font-weight="800">4</text>
        <text x="78" y="34" fill="#7f1d1d" font-size="18" font-weight="700">取消と代替</text>
        <text x="78" y="57" fill="#475569" font-size="14">中止時も顧客と売上を放置しない</text>
      </g>
    </g>
  </g>
  <text x="70" y="558" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="82" font-weight="800">90 DAYS</text>
  <text x="74" y="599" fill="#315f65" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21">小さく売り、利益と品質で継続を判断する</text>
</svg>
