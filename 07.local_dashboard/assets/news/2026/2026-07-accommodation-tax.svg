<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">京都・大阪・東京の宿泊税比較</title>
  <desc id="desc">3地域の宿泊税を、宿泊日、価格帯、料金表示の順に予約システムへ反映する明るいグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffdf2"/><stop offset="1" stop-color="#eaf8ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17324d" flood-opacity=".14"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1090" cy="80" r="176" fill="#ffffff" fill-opacity=".55"/>
  <circle cx="1110" cy="90" r="116" fill="none" stroke="#f59e0b" stroke-opacity=".18" stroke-width="34"/>
  <text x="72" y="86" fill="#9a5b00" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="4">POLICY COMPARISON</text>
  <text x="72" y="170" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">京都・大阪・東京の宿泊税</text>
  <text x="72" y="232" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="42" font-weight="700">予約表示へ反映する5手順</text>
  <g transform="translate(72 300)">
    <rect width="494" height="236" rx="28" fill="#ffffff" filter="url(#shadow)"/>
    <text x="40" y="58" fill="#31546f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="20" font-weight="700">更新する基準</text>
    <g transform="translate(38 86)">
      <circle cx="28" cy="28" r="28" fill="#fef3c7"/>
      <text x="28" y="36" fill="#8a4b00" font-family="Segoe UI, sans-serif" font-size="24" font-weight="800" text-anchor="middle">1</text>
      <text x="72" y="35" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">宿泊日</text>
    </g>
    <path d="M194 114h42" stroke="#8db5ca" stroke-width="4" stroke-linecap="round"/>
    <path d="m226 104 12 10-12 10" fill="none" stroke="#8db5ca" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(244 86)">
      <circle cx="28" cy="28" r="28" fill="#d9f4ee"/>
      <text x="28" y="36" fill="#086c60" font-family="Segoe UI, sans-serif" font-size="24" font-weight="800" text-anchor="middle">2</text>
      <text x="72" y="35" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">価格帯</text>
    </g>
    <path d="M194 186h42" stroke="#8db5ca" stroke-width="4" stroke-linecap="round"/>
    <path d="m226 176 12 10-12 10" fill="none" stroke="#8db5ca" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <g transform="translate(244 158)">
      <circle cx="28" cy="28" r="28" fill="#dbeafe"/>
      <text x="28" y="36" fill="#1456a0" font-family="Segoe UI, sans-serif" font-size="24" font-weight="800" text-anchor="middle">3</text>
      <text x="72" y="35" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">表示・徴収</text>
    </g>
  </g>
  <g transform="translate(620 286)" filter="url(#shadow)">
    <rect width="500" height="264" rx="28" fill="#ffffff"/>
    <text x="34" y="54" fill="#31546f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="20" font-weight="700">地域別マスター</text>
    <g transform="translate(34 82)">
      <rect width="432" height="48" rx="14" fill="#fff7d6"/>
      <text x="22" y="32" fill="#6d4300" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">京都</text>
      <text x="410" y="32" fill="#6d4300" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" text-anchor="end">2026.03</text>
      <rect y="62" width="432" height="48" rx="14" fill="#e5f7ef"/>
      <text x="22" y="94" fill="#075e54" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">大阪</text>
      <text x="410" y="94" fill="#075e54" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" text-anchor="end">2025.09</text>
      <rect y="124" width="432" height="48" rx="14" fill="#e8f2ff"/>
      <text x="22" y="156" fill="#174f8c" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">東京</text>
      <text x="410" y="156" fill="#174f8c" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" text-anchor="end">2027.04</text>
    </g>
  </g>
  <g transform="translate(72 588)">
    <rect width="174" height="42" rx="21" fill="#fef3c7"/><text x="87" y="28" fill="#714300" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700" text-anchor="middle">公式情報を比較</text>
    <rect x="190" width="174" height="42" rx="21" fill="#d9f4ee"/><text x="277" y="28" fill="#075e54" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700" text-anchor="middle">境界値を試算</text>
    <rect x="380" width="174" height="42" rx="21" fill="#dbeafe"/><text x="467" y="28" fill="#174f8c" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700" text-anchor="middle">予約導線へ反映</text>
  </g>
