<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">インバウンド集客チャネル選定</title>
  <desc id="desc">市場と旅行段階に合わせて検索、SNS、メディア、OTA、旅行会社、CRMを選ぶグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#edf6ff"/><stop offset="1" stop-color="#e6f8f3"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="75" r="180" fill="none" stroke="#0f766e" stroke-opacity=".10" stroke-width="52"/>
  <text x="72" y="86" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="5">CHANNEL MIX</text>
  <text x="72" y="174" fill="#123b44" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">市場×旅行段階で選ぶ</text>
  <text x="72" y="238" fill="#123b44" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">インバウンド集客</text>
  <text x="72" y="380" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="100" font-weight="800">6 CHANNELS</text>
  <text x="76" y="430" fill="#315f65" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25">市場 × 旅行段階 × 販売方法</text>
  <g transform="translate(680 116)" filter="url(#shadow)">
    <rect width="426" height="432" rx="30" fill="#fff" fill-opacity=".97"/>
    <circle cx="213" cy="216" r="72" fill="#0f766e"/>
    <text x="213" y="207" fill="#ccfbf1" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="16" font-weight="700" text-anchor="middle">TARGET</text>
    <text x="213" y="237" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700" text-anchor="middle">次の行動</text>
    <g stroke="#94a3b8" stroke-width="3">
      <line x1="213" y1="142" x2="213" y2="64"/><line x1="280" y1="177" x2="350" y2="136"/><line x1="280" y1="255" x2="350" y2="296"/><line x1="213" y1="290" x2="213" y2="368"/><line x1="146" y1="255" x2="76" y2="296"/><line x1="146" y1="177" x2="76" y2="136"/>
    </g>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="16" font-weight="700" text-anchor="middle">
      <rect x="145" y="28" width="136" height="48" rx="16" fill="#cffafe"/><text x="213" y="58" fill="#155e75">検索・地図</text>
      <rect x="300" y="104" width="108" height="48" rx="16" fill="#ccfbf1"/><text x="354" y="134" fill="#115e59">SNS</text>
      <rect x="300" y="280" width="108" height="48" rx="16" fill="#dbeafe"/><text x="354" y="310" fill="#1e3a8a">メディア</text>
      <rect x="151" y="356" width="124" height="48" rx="16" fill="#ede9fe"/><text x="213" y="386" fill="#5b21b6">OTA</text>
      <rect x="18" y="280" width="116" height="48" rx="16" fill="#fef3c7"/><text x="76" y="310" fill="#92400e">旅行会社</text>
      <rect x="18" y="104" width="116" height="48" rx="16" fill="#fee2e2"/><text x="76" y="134" fill="#991b1b">CRM</text>
    </g>
  </g>
  <rect x="72" y="502" width="520" height="56" rx="28" fill="#0f766e" fill-opacity=".09"/>
  <text x="98" y="538" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">認知・検討・予約・再訪で役割を分ける</text>
</svg>
