<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">速報・暫定・確報を分ける統計記事の更新手順</title>
  <desc id="desc">推計値、速報値、暫定値、確定値を分けて記事更新を判断する明るい台帳図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f7fbff"/><stop offset="1" stop-color="#edf7ee"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#16324f" flood-opacity=".16"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1076" cy="110" r="166" fill="#ffffff" fill-opacity=".7"/>
  <circle cx="1112" cy="145" r="98" fill="none" stroke="#2f8a70" stroke-opacity=".22" stroke-width="32"/>
  <text x="72" y="86" fill="#246a5d" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="4">EVIDENCE GUIDE</text>
  <text x="72" y="168" fill="#18324a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="47" font-weight="700">速報・暫定・確報を分ける</text>
  <text x="72" y="228" fill="#18324a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="43" font-weight="700">統計記事の更新手順</text>
  <g transform="translate(70 302)" filter="url(#shadow)">
    <rect width="1060" height="244" rx="28" fill="#ffffff"/>
    <line x1="70" y1="128" x2="990" y2="128" stroke="#d7e5df" stroke-width="10" stroke-linecap="round"/>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" text-anchor="middle">
      <g transform="translate(132 128)">
        <circle r="48" fill="#dff3ec"/>
        <text y="-4" fill="#0f5f55" font-size="21" font-weight="700">推計</text>
        <text y="23" fill="#0f5f55" font-size="15" font-weight="700">翌月に読む</text>
      </g>
      <g transform="translate(388 128)">
        <circle r="48" fill="#fff2c7"/>
        <text y="-4" fill="#83520c" font-size="21" font-weight="700">速報</text>
        <text y="23" fill="#83520c" font-size="15" font-weight="700">範囲を限定</text>
      </g>
      <g transform="translate(648 128)">
        <circle r="48" fill="#dfeeff"/>
        <text y="-4" fill="#19528e" font-size="21" font-weight="700">暫定</text>
        <text y="23" fill="#19528e" font-size="15" font-weight="700">表を差替</text>
      </g>
      <g transform="translate(908 128)">
        <circle r="48" fill="#ece7ff"/>
        <text y="-4" fill="#5b3c94" font-size="21" font-weight="700">確報</text>
        <text y="23" fill="#5b3c94" font-size="15" font-weight="700">年次更新</text>
      </g>
    </g>
    <text x="72" y="54" fill="#334155" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="23" font-weight="700">更新台帳で、何を直すか先に決める</text>
    <text x="72" y="215" fill="#5a6b7a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="20">確認日・対象期間・段階・保留事項・訂正条件・次回確認を1行で残す</text>
  </g>
  <g transform="translate(92 578)">
    <rect width="250" height="48" rx="24" fill="#dff3ec"/>
    <text x="125" y="31" fill="#0f5f55" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">定義を確認</text>
    <rect x="294" width="250" height="48" rx="24" fill="#fff2c7"/>
    <text x="419" y="31" fill="#83520c" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">速報は限定</text>
    <rect x="588" width="250" height="48" rx="24" fill="#dfeeff"/>
    <text x="713" y="31" fill="#19528e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">暫定で差替</text>
    <rect x="882" width="206" height="48" rx="24" fill="#ece7ff"/>
    <text x="985" y="31" fill="#5b3c94" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">確報で固定</text>
  </g>
</svg>
