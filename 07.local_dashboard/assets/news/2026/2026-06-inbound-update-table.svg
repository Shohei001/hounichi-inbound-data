<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">6月315万人を上半期・宿泊・消費で更新する判断表</title>
  <desc id="desc">2026年6月の訪日外客数を、上半期、宿泊、消費の3指標に分けて更新する明るいサムネイル</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fffdf2"/><stop offset="1" stop-color="#e8f7ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#17324d" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1060" cy="92" r="170" fill="#ffffff" fill-opacity=".6"/>
  <circle cx="1115" cy="126" r="96" fill="none" stroke="#22a6a1" stroke-opacity=".22" stroke-width="30"/>
  <text x="72" y="88" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="4">DATA ANALYSIS</text>
  <text x="72" y="170" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="47" font-weight="700">6月315万人を</text>
  <text x="72" y="232" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="43" font-weight="700">上半期・宿泊・消費で更新</text>
  <g transform="translate(72 298)" filter="url(#shadow)">
    <rect width="322" height="206" rx="26" fill="#ffffff"/>
    <rect x="28" y="30" width="70" height="70" rx="20" fill="#d9f4ee"/>
    <text x="63" y="76" fill="#086c60" font-family="Segoe UI, sans-serif" font-size="30" font-weight="800" text-anchor="middle">1</text>
    <text x="30" y="132" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="26" font-weight="700">訪日外客数</text>
    <text x="30" y="172" fill="#31546f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700">314.9万人</text>
  </g>
  <g transform="translate(440 298)" filter="url(#shadow)">
    <rect width="322" height="206" rx="26" fill="#ffffff"/>
    <rect x="28" y="30" width="70" height="70" rx="20" fill="#fff0c4"/>
    <text x="63" y="76" fill="#8a4b00" font-family="Segoe UI, sans-serif" font-size="30" font-weight="800" text-anchor="middle">2</text>
    <text x="30" y="132" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="26" font-weight="700">外国人宿泊</text>
    <text x="30" y="172" fill="#31546f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700">1,382万人泊</text>
  </g>
  <g transform="translate(808 298)" filter="url(#shadow)">
    <rect width="322" height="206" rx="26" fill="#ffffff"/>
    <rect x="28" y="30" width="70" height="70" rx="20" fill="#dbeafe"/>
    <text x="63" y="76" fill="#174f8c" font-family="Segoe UI, sans-serif" font-size="30" font-weight="800" text-anchor="middle">3</text>
    <text x="30" y="132" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="26" font-weight="700">消費単価</text>
    <text x="30" y="172" fill="#31546f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700">24.4万円</text>
  </g>
  <g transform="translate(120 548)">
    <rect width="240" height="46" rx="23" fill="#d9f4ee"/>
    <text x="120" y="30" fill="#075e54" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">市場構成を更新</text>
    <rect x="300" width="240" height="46" rx="23" fill="#fff0c4"/>
    <text x="420" y="30" fill="#714300" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">宿泊詳細を待つ</text>
    <rect x="600" width="240" height="46" rx="23" fill="#dbeafe"/>
    <text x="720" y="30" fill="#174f8c" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">単価施策を確認</text>
  </g>
</svg>
