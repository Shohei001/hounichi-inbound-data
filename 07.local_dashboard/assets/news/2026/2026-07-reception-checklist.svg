<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">インバウンド受入・予約・決済チェックリスト</title>
  <desc id="desc">情報、商品、価格、予約、決済、確認、当日、改善を40項目で点検するグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#faf5ff"/><stop offset="1" stop-color="#e0f2fe"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#020617" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1085" cy="78" r="182" fill="none" stroke="#7c3aed" stroke-opacity=".08" stroke-width="54"/>
  <text x="72" y="86" fill="#6d28d9" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="5">BOOKING READINESS</text>
  <text x="72" y="174" fill="#352a4a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">予約完了率を高める</text>
  <text x="72" y="238" fill="#352a4a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">受入環境を40項目で点検</text>
  <text x="72" y="380" fill="#6d28d9" font-family="Segoe UI, sans-serif" font-size="104" font-weight="800">40 CHECKS</text>
  <text x="76" y="430" fill="#53617a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25">情報・在庫・価格・予約・決済・確認・当日・改善</text>
  <g transform="translate(735 102)" filter="url(#shadow)">
    <rect width="350" height="458" rx="26" fill="#fff" fill-opacity=".97"/>
    <rect x="95" y="24" width="160" height="34" rx="17" fill="#dbeafe"/>
    <text x="175" y="47" fill="#1e3a8a" font-family="Segoe UI, sans-serif" font-size="14" font-weight="700" text-anchor="middle">AUDIT SHEET</text>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700">
      <g transform="translate(38 88)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">基本情報・地図</text></g>
      <g transform="translate(38 132)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">商品・在庫</text></g>
      <g transform="translate(38 176)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">価格・取消条件</text></g>
      <g transform="translate(38 220)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">予約画面</text></g>
      <g transform="translate(38 264)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">決済</text></g>
      <g transform="translate(38 308)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">確認・来訪前</text></g>
      <g transform="translate(38 352)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">当日対応</text></g>
      <g transform="translate(38 396)"><rect width="25" height="25" rx="6" fill="#0f766e"/><path d="m6 13 5 5 9-11" fill="none" stroke="#fff" stroke-width="3"/><text x="42" y="19" fill="#334155">計測・改善</text></g>
    </g>
  </g>
  <rect x="72" y="502" width="520" height="56" rx="28" fill="#6d28d9" fill-opacity=".08"/>
  <text x="98" y="538" fill="#352a4a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">重大欠陥をゼロにし、予約完了へつなぐ</text>
</svg>
