<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">訪日外国人旅行者の災害・危機対応</title>
  <desc id="desc">役割、情報源、安全確保、行動文、避難、連絡、代替通信、訓練の8項目</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7ed"/><stop offset=".55" stop-color="#fee2e2"/><stop offset="1" stop-color="#eff6ff"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#020617" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="76" r="190" fill="none" stroke="#b91c1c" stroke-opacity=".09" stroke-width="58"/>
  <text x="70" y="84" fill="#b91c1c" font-family="Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="5">CRISIS COMMUNICATION</text>
  <text x="70" y="168" fill="#3f2a2a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="45" font-weight="700">災害時に旅行者を</text>
  <text x="70" y="231" fill="#3f2a2a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="45" font-weight="700">安全行動へ導く</text>
  <text x="70" y="303" fill="#7f3b2f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">多言語情報を8項目で整える</text>
  <g transform="translate(70 370)">
    <rect width="545" height="72" rx="36" fill="#b91c1c" fill-opacity=".08"/>
    <text x="31" y="45" fill="#5f2f2f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">役割・公式情報・避難・予約客・代替通信</text>
  </g>
  <text x="70" y="554" fill="#b91c1c" font-family="Segoe UI, sans-serif" font-size="102" font-weight="800">8 ACTIONS</text>
  <text x="74" y="598" fill="#7f3b2f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21">平常時に短文と連絡網を準備する</text>
  <g transform="translate(690 92)" filter="url(#shadow)">
    <rect width="420" height="494" rx="31" fill="#fff" fill-opacity=".98"/>
    <path d="M210 38 350 92v108c0 105-55 195-140 249C125 395 70 305 70 200V92Z" fill="#fee2e2" stroke="#fca5a5" stroke-width="4"/>
    <path d="M210 90 304 126v75c0 69-36 128-94 166-58-38-94-97-94-166v-75Z" fill="#b91c1c"/>
    <path d="M196 150h28v88h-28zM196 257h28v28h-28z" fill="#fff"/>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="15" font-weight="700">
      <g transform="translate(40 390)"><circle cx="15" cy="15" r="15" fill="#1d4ed8"/><text x="39" y="21" fill="#334155">安全確保</text></g>
      <g transform="translate(160 390)"><circle cx="15" cy="15" r="15" fill="#0f766e"/><text x="39" y="21" fill="#334155">避難</text></g>
      <g transform="translate(280 390)"><circle cx="15" cy="15" r="15" fill="#d97706"/><text x="39" y="21" fill="#334155">情報</text></g>
      <g transform="translate(98 438)"><circle cx="15" cy="15" r="15" fill="#7c3aed"/><text x="39" y="21" fill="#334155">連絡</text></g>
      <g transform="translate(236 438)"><circle cx="15" cy="15" r="15" fill="#dc2626"/><text x="39" y="21" fill="#334155">訓練</text></g>
    </g>
  </g>
</svg>
