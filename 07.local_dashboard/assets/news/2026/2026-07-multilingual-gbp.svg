<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">多言語とGoogleビジネスプロフィール</title>
  <desc id="desc">地図、検索、多言語ページ、予約、決済、現地体験を7項目でつなぐグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#082f49"/><stop offset="1" stop-color="#115e59"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#001e26" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1090" cy="70" r="180" fill="none" stroke="#a5f3fc" stroke-opacity=".12" stroke-width="54"/>
  <text x="72" y="86" fill="#a5f3fc" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="5">LOCAL DISCOVERY</text>
  <text x="72" y="174" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">多言語対応は</text>
  <text x="72" y="238" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">翻訳だけでは届かない</text>
  <text x="72" y="380" fill="#fff" font-family="Segoe UI, sans-serif" font-size="100" font-weight="800">7 TOUCHPOINTS</text>
  <text x="76" y="430" fill="#d7f8f2" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25">地図・検索・商品・予約・決済・確認・現地</text>
  <g transform="translate(725 118)" filter="url(#shadow)">
    <rect width="380" height="430" rx="34" fill="#fff" fill-opacity=".97"/>
    <rect x="28" y="28" width="324" height="74" rx="20" fill="#e0f2fe"/>
    <circle cx="70" cy="65" r="22" fill="#0f766e"/>
    <path d="M70 47c-10 0-18 8-18 18 0 14 18 30 18 30s18-16 18-30c0-10-8-18-18-18zm0 25a7 7 0 1 1 0-14 7 7 0 0 1 0 14z" fill="#fff"/>
    <text x="112" y="59" fill="#0f3e50" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700">Google・地図</text>
    <text x="112" y="82" fill="#475569" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="14">正確な施設情報</text>
    <g fill="none" stroke="#0f766e" stroke-width="4" stroke-linecap="round">
      <path d="M190 103v38"/><path d="M190 191v38"/><path d="M190 279v38"/>
    </g>
    <g>
      <rect x="46" y="142" width="288" height="49" rx="16" fill="#ccfbf1"/><text x="190" y="173" fill="#115e59" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700" text-anchor="middle">市場言語の商品ページ</text>
      <rect x="46" y="230" width="288" height="49" rx="16" fill="#cffafe"/><text x="190" y="261" fill="#155e75" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700" text-anchor="middle">予約・決済を完了</text>
      <rect x="46" y="318" width="288" height="49" rx="16" fill="#dbeafe"/><text x="190" y="349" fill="#1e3a8a" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700" text-anchor="middle">確認・現地体験</text>
    </g>
    <text x="190" y="404" fill="#64748b" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="15" text-anchor="middle">情報を途中で切らない</text>
  </g>
  <rect x="72" y="502" width="556" height="56" rx="28" fill="#fff" fill-opacity=".12"/>
  <text x="98" y="538" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">旅行者として検索し、予約完了まで点検する</text>
</svg>
