<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">手ぶら観光を混雑対策に使う地域が測る4指標</title>
  <desc id="desc">利用率、荷物圧力、案内摩擦、回遊変化を並べた手ぶら観光のKPI設計図</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#f8fbff"/><stop offset="1" stop-color="#e7f6f1"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#0f172a" flood-opacity=".18"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1070" cy="92" r="190" fill="none" stroke="#0f766e" stroke-width="50" stroke-opacity=".08"/>
  <text x="72" y="88" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="4">HANDS-FREE TOURISM</text>
  <text x="72" y="172" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">混雑対策にする前に</text>
  <text x="72" y="236" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">4指標で小さく測る</text>
  <g transform="translate(70 330)">
    <rect x="0" y="0" width="510" height="70" rx="28" fill="#0f766e" fill-opacity=".10"/>
    <text x="28" y="45" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">利用率・荷物圧力・案内摩擦・回遊変化</text>
  </g>
  <g transform="translate(642 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="450" rx="24" fill="#ffffff"/>
    <g transform="translate(44 48)">
      <rect x="0" y="0" width="150" height="96" rx="18" fill="#dff7ef"/>
      <rect x="184" y="0" width="150" height="96" rx="18" fill="#e0f2fe"/>
      <rect x="0" y="132" width="150" height="96" rx="18" fill="#fef3c7"/>
      <rect x="184" y="132" width="150" height="96" rx="18" fill="#ede9fe"/>
      <g fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-weight="700" text-anchor="middle">
        <text x="75" y="42" font-size="24">利用率</text>
        <text x="259" y="42" font-size="24">荷物圧力</text>
        <text x="75" y="174" font-size="24">案内摩擦</text>
        <text x="259" y="174" font-size="24">回遊変化</text>
      </g>
      <g fill="#315a73" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
        <text x="75" y="70">対象母数で見る</text>
        <text x="259" y="70">混雑地点で見る</text>
        <text x="75" y="202">受付前を直す</text>
        <text x="259" y="202">滞在後を追う</text>
      </g>
      <path d="M75 255 L75 315 L259 315 L259 255" fill="none" stroke="#0f766e" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <rect x="60" y="305" width="214" height="58" rx="18" fill="#0f766e"/>
      <text x="167" y="342" fill="#ffffff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700" text-anchor="middle">90日実証</text>
    </g>
  </g>
  <g transform="translate(74 500)">
    <rect x="0" y="0" width="500" height="76" rx="18" fill="#ffffff" fill-opacity=".78"/>
    <text x="28" y="31" fill="#0f766e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700">導入可否より先に決めること</text>
    <text x="28" y="58" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700">どこで、何を、何点以上なら続けるか</text>
  </g>
</svg>
