<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">口コミから再訪へつなぐ運用</title>
  <desc id="desc">口コミを収集、分類、返信、改善、再訪へつなぐ6ステップのグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#312e81"/><stop offset=".52" stop-color="#6b21a8"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#020617" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="82" r="185" fill="none" stroke="#f0abfc" stroke-opacity=".13" stroke-width="56"/>
  <text x="70" y="84" fill="#e9d5ff" font-family="Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="5">REVIEW TO RETURN</text>
  <text x="70" y="173" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="47" font-weight="700">口コミは「星の数」で</text>
  <text x="70" y="238" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="47" font-weight="700">管理しない</text>
  <text x="70" y="301" fill="#f5d0fe" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">不満の原因を直し、次の訪問理由を作る</text>
  <g transform="translate(76 370)">
    <path d="M0 0h470a24 24 0 0 1 24 24v93a24 24 0 0 1-24 24H124l-58 44 13-44H24A24 24 0 0 1 0 117Z" fill="#fff" fill-opacity=".13"/>
    <text x="32" y="51" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700">平均点より、繰り返す原因を見る</text>
    <text x="32" y="88" fill="#ede9fe" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17">情報・予約・アクセス・接客・品質・安全</text>
    <text x="32" y="116" fill="#ede9fe" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17">地域配慮まで8分類で改善する</text>
  </g>
  <g transform="translate(680 92)" filter="url(#shadow)">
    <rect width="425" height="493" rx="30" fill="#fff" fill-opacity=".98"/>
    <circle cx="212" cy="247" r="108" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="3"/>
    <text x="212" y="232" text-anchor="middle" fill="#5b21b6" font-family="Segoe UI, sans-serif" font-size="48" font-weight="800">6</text>
    <text x="212" y="268" text-anchor="middle" fill="#475569" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700">STEP LOOP</text>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="16" font-weight="700" text-anchor="middle">
      <g transform="translate(212 45)"><circle r="39" fill="#7c3aed"/><text y="6" fill="#fff">収集</text></g>
      <g transform="translate(352 124)"><circle r="39" fill="#8b5cf6"/><text y="6" fill="#fff">分類</text></g>
      <g transform="translate(352 370)"><circle r="39" fill="#2563eb"/><text y="6" fill="#fff">優先</text></g>
      <g transform="translate(212 449)"><circle r="39" fill="#0891b2"/><text y="6" fill="#fff">返信</text></g>
      <g transform="translate(72 370)"><circle r="39" fill="#0d9488"/><text y="6" fill="#fff">改善</text></g>
      <g transform="translate(72 124)"><circle r="39" fill="#059669"/><text y="6" fill="#fff">再訪</text></g>
    </g>
    <path d="M248 56q67 19 91 55M380 163q23 76-1 160M340 407q-43 40-91 39M176 446q-66-19-91-54M44 332q-22-76 1-160M84 87q43-39 91-39" fill="none" stroke="#94a3b8" stroke-width="4" stroke-linecap="round" stroke-dasharray="7 9"/>
  </g>
  <text x="72" y="613" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">返信で終わらせず、同じ不満の再発率を下げる</text>
</svg>
