<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">インバウンドKPI設計</title>
  <desc id="desc">旅行消費額を頂点に、宿泊、単価、満足、施策指標を3層でつなぐKPIツリー</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#eff6ff"/><stop offset="1" stop-color="#e0f2fe"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#020617" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1085" cy="80" r="185" fill="none" stroke="#0369a1" stroke-opacity=".09" stroke-width="54"/>
  <text x="72" y="86" fill="#0369a1" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="5">KPI DESIGN</text>
  <text x="72" y="176" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">売上・宿泊・満足・還元を</text>
  <text x="72" y="240" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">一つのKPI設計へ</text>
  <text x="72" y="380" fill="#0369a1" font-family="Segoe UI, sans-serif" font-size="100" font-weight="800">3 LEVELS</text>
  <text x="76" y="430" fill="#315a73" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25">最終成果・顧客/地域成果・施策成果</text>
  <g transform="translate(676 104)" filter="url(#shadow)">
    <line x1="220" y1="100" x2="105" y2="215" stroke="#67e8f9" stroke-width="5" stroke-opacity=".7"/>
    <line x1="220" y1="100" x2="220" y2="215" stroke="#67e8f9" stroke-width="5" stroke-opacity=".7"/>
    <line x1="220" y1="100" x2="335" y2="215" stroke="#67e8f9" stroke-width="5" stroke-opacity=".7"/>
    <line x1="105" y1="270" x2="55" y2="375" stroke="#93c5fd" stroke-width="4" stroke-opacity=".65"/>
    <line x1="105" y1="270" x2="150" y2="375" stroke="#93c5fd" stroke-width="4" stroke-opacity=".65"/>
    <line x1="220" y1="270" x2="245" y2="375" stroke="#93c5fd" stroke-width="4" stroke-opacity=".65"/>
    <line x1="335" y1="270" x2="340" y2="375" stroke="#93c5fd" stroke-width="4" stroke-opacity=".65"/>
    <line x1="335" y1="270" x2="425" y2="375" stroke="#93c5fd" stroke-width="4" stroke-opacity=".65"/>
    <rect x="95" y="30" width="250" height="78" rx="18" fill="#0f766e"/>
    <text x="220" y="64" fill="#ccfbf1" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="16" font-weight="700" text-anchor="middle">KGI</text>
    <text x="220" y="91" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="22" font-weight="700" text-anchor="middle">旅行消費額・売上</text>
    <g fill="#fff">
      <rect x="32" y="205" width="146" height="70" rx="16"/>
      <rect x="147" y="205" width="146" height="70" rx="16"/>
      <rect x="262" y="205" width="146" height="70" rx="16"/>
    </g>
    <g fill="#0f3e50" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">
      <text x="105" y="248">単価</text><text x="220" y="248">宿泊</text><text x="335" y="248">満足・還元</text>
    </g>
    <g fill="#dbeafe">
      <rect x="12" y="370" width="86" height="62" rx="14"/>
      <rect x="107" y="370" width="86" height="62" rx="14"/>
      <rect x="202" y="370" width="86" height="62" rx="14"/>
      <rect x="297" y="370" width="86" height="62" rx="14"/>
      <rect x="392" y="370" width="86" height="62" rx="14"/>
    </g>
    <g fill="#1e3a5f" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
      <text x="55" y="407">閲覧</text><text x="150" y="407">遷移</text><text x="245" y="407">予約</text><text x="340" y="407">体験</text><text x="435" y="407">再訪</text>
    </g>
  </g>
  <rect x="72" y="500" width="500" height="56" rx="28" fill="#0369a1" fill-opacity=".08"/>
  <text x="98" y="536" fill="#17324d" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">数字の報告から、次の行動を決める会議へ</text>
</svg>
