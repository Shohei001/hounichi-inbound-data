<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">地方誘客の6ステップ</title>
  <desc id="desc">市場、交通、滞在、予約、消費、地域還元を一本の導線でつなぐ地方誘客のグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#19352f"/><stop offset="1" stop-color="#0f766e"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#052e2b" flood-opacity=".36"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="80" r="180" fill="none" stroke="#bbf7d0" stroke-opacity=".12" stroke-width="54"/>
  <text x="72" y="86" fill="#bbf7d0" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="5">REGIONAL INBOUND</text>
  <text x="72" y="176" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">地方誘客は</text>
  <text x="72" y="240" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">「PR」だけでは進まない</text>
  <text x="72" y="380" fill="#fff" font-family="Segoe UI, sans-serif" font-size="104" font-weight="800">6 STEPS</text>
  <text x="76" y="430" fill="#dcfce7" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25">市場から地域還元までを一本につなぐ</text>
  <g transform="translate(630 150)" filter="url(#shadow)">
    <path d="M50 175 C125 40, 225 45, 275 170 S425 300, 500 145" fill="none" stroke="#a7f3d0" stroke-width="8" stroke-linecap="round" stroke-dasharray="16 14"/>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-weight="700" text-anchor="middle">
      <circle cx="50" cy="175" r="48" fill="#fff"/><text x="50" y="168" fill="#115e59" font-size="15">市場</text><text x="50" y="190" fill="#115e59" font-size="15">選定</text>
      <circle cx="140" cy="82" r="48" fill="#d1fae5"/><text x="140" y="89" fill="#115e59" font-size="17">交通</text>
      <circle cx="250" cy="114" r="48" fill="#fff"/><text x="250" y="107" fill="#115e59" font-size="15">滞在</text><text x="250" y="129" fill="#115e59" font-size="15">理由</text>
      <circle cx="330" cy="235" r="48" fill="#d1fae5"/><text x="330" y="242" fill="#115e59" font-size="17">予約</text>
      <circle cx="425" cy="260" r="48" fill="#fff"/><text x="425" y="253" fill="#115e59" font-size="15">地域内</text><text x="425" y="275" fill="#115e59" font-size="15">消費</text>
      <circle cx="500" cy="145" r="53" fill="#0f766e" stroke="#fff" stroke-width="5"/><text x="500" y="138" fill="#fff" font-size="15">地域</text><text x="500" y="160" fill="#fff" font-size="15">還元</text>
    </g>
    <path d="M470 337 h76 v58 h-76 z M458 337 l50-42 50 42" fill="#ecfdf5" stroke="#5eead4" stroke-width="4" stroke-linejoin="round"/>
    <rect x="487" y="356" width="18" height="39" fill="#0f766e"/>
  </g>
  <rect x="72" y="500" width="505" height="56" rx="28" fill="#fff" fill-opacity=".12"/>
  <text x="98" y="536" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">来られる・泊まれる・予約できるを先に作る</text>
</svg>
