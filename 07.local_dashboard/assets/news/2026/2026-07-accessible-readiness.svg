<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">アクセシブルなインバウンド受入</title>
  <desc id="desc">予約前情報、移動、コミュニケーション、商品、緊急時、研修の6領域</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#0c4a6e"/><stop offset=".55" stop-color="#0f766e"/><stop offset="1" stop-color="#166534"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#020617" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1085" cy="78" r="190" fill="none" stroke="#bae6fd" stroke-opacity=".13" stroke-width="58"/>
  <text x="70" y="84" fill="#a7f3d0" font-family="Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="5">ACCESSIBLE JOURNEY</text>
  <text x="70" y="168" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="44" font-weight="700">アクセシブルな受入は</text>
  <text x="70" y="231" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="44" font-weight="700">「設備あり」だけでは足りない</text>
  <text x="70" y="302" fill="#d1fae5" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">できること・条件・代替を予約前に伝える</text>
  <g transform="translate(70 370)">
    <rect width="548" height="72" rx="36" fill="#fff" fill-opacity=".11"/>
    <text x="31" y="45" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">情報 × 移動 × 対話 × 商品 × 緊急 × 研修</text>
  </g>
  <text x="70" y="554" fill="#fff" font-family="Segoe UI, sans-serif" font-size="102" font-weight="800">6 AREAS</text>
  <text x="74" y="598" fill="#bae6fd" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21">本人へ必要な支援を確認する</text>
  <g transform="translate(690 92)" filter="url(#shadow)">
    <rect width="420" height="494" rx="31" fill="#fff" fill-opacity=".98"/>
    <circle cx="210" cy="235" r="84" fill="#0f766e"/>
    <text x="210" y="226" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="48" font-weight="800">6</text>
    <text x="210" y="262" text-anchor="middle" fill="#ccfbf1" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="17" font-weight="700">CONNECTED AREAS</text>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
      <g transform="translate(210 64)"><circle r="44" fill="#0369a1"/><text y="5" fill="#fff">情報</text></g>
      <g transform="translate(354 147)"><circle r="44" fill="#0891b2"/><text y="5" fill="#fff">移動</text></g>
      <g transform="translate(354 328)"><circle r="44" fill="#7c3aed"/><text y="5" fill="#fff">対話</text></g>
      <g transform="translate(210 412)"><circle r="44" fill="#d97706"/><text y="5" fill="#fff">商品</text></g>
      <g transform="translate(66 328)"><circle r="44" fill="#dc2626"/><text y="5" fill="#fff">緊急</text></g>
      <g transform="translate(66 147)"><circle r="44" fill="#15803d"/><text y="5" fill="#fff">研修</text></g>
    </g>
    <g stroke="#94a3b8" stroke-width="4" stroke-linecap="round">
      <path d="M210 151V109M285 192l31-18M285 278l31 18M210 319v49M135 278l-31 18M135 192l-31-18"/>
    </g>
  </g>
</svg>
