<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">インバウンド来訪者アンケート設計</title>
  <desc id="desc">市場、泊数、消費、満足、不満、再訪を15問でつなぐアンケート</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#fff7ed"/><stop offset=".52" stop-color="#ffedd5"/><stop offset="1" stop-color="#e6fffb"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="13" stdDeviation="16" flood-color="#020617" flood-opacity=".34"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1080" cy="76" r="190" fill="none" stroke="#ea580c" stroke-opacity=".08" stroke-width="58"/>
  <text x="70" y="84" fill="#c2410c" font-family="Segoe UI, sans-serif" font-size="23" font-weight="700" letter-spacing="5">VISITOR SURVEY</text>
  <text x="70" y="168" fill="#4b3328" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="44" font-weight="700">消費・不満・再訪を測る</text>
  <text x="70" y="231" fill="#4b3328" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="44" font-weight="700">来訪者アンケート設計</text>
  <text x="70" y="302" fill="#7c4a32" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="24" font-weight="700">誰が・何泊・いくら・なぜ・次は何を</text>
  <g transform="translate(70 370)">
    <rect width="552" height="72" rx="36" fill="#ea580c" fill-opacity=".08"/>
    <text x="31" y="45" fill="#5f392c" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21" font-weight="700">市場 → 予約 → 滞在 → 消費 → 不満 → 再訪</text>
  </g>
  <text x="70" y="554" fill="#c2410c" font-family="Segoe UI, sans-serif" font-size="102" font-weight="800">15 Q</text>
  <text x="74" y="598" fill="#7c4a32" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="21">5分以内で、次の改善を決める</text>
  <g transform="translate(705 90)" filter="url(#shadow)">
    <rect width="390" height="496" rx="30" fill="#fff" fill-opacity=".98"/>
    <rect x="52" y="38" width="286" height="420" rx="20" fill="#fff7ed" stroke="#fdba74" stroke-width="3"/>
    <rect x="135" y="21" width="120" height="38" rx="19" fill="#0f766e"/>
    <text x="195" y="46" text-anchor="middle" fill="#fff" font-family="Segoe UI, sans-serif" font-size="15" font-weight="800">SURVEY</text>
    <g font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="16" font-weight="700">
      <g transform="translate(82 88)"><circle cx="14" cy="14" r="14" fill="#ea580c"/><text x="42" y="20" fill="#334155">市場・訪問回数</text></g>
      <g transform="translate(82 143)"><circle cx="14" cy="14" r="14" fill="#d97706"/><text x="42" y="20" fill="#334155">予約・利用商品</text></g>
      <g transform="translate(82 198)"><circle cx="14" cy="14" r="14" fill="#ca8a04"/><text x="42" y="20" fill="#334155">泊数・地域内消費</text></g>
      <g transform="translate(82 253)"><circle cx="14" cy="14" r="14" fill="#0d9488"/><text x="42" y="20" fill="#334155">満足・重要度</text></g>
      <g transform="translate(82 308)"><circle cx="14" cy="14" r="14" fill="#0891b2"/><text x="42" y="20" fill="#334155">困りごと・改善</text></g>
      <g transform="translate(82 363)"><circle cx="14" cy="14" r="14" fill="#7c3aed"/><text x="42" y="20" fill="#334155">再訪・次の関心</text></g>
    </g>
    <rect x="88" y="414" width="214" height="18" rx="9" fill="#fed7aa"/>
    <rect x="88" y="414" width="160" height="18" rx="9" fill="#0f766e"/>
  </g>
</svg>
