<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">インバウンドのターゲット市場選定</title>
  <desc id="desc">市場規模、消費価値、成長性、アクセス、地域適合性の5指標で市場を比較するグラフィック</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#ecfeff"/><stop offset="1" stop-color="#dff7f1"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#001e26" flood-opacity=".35"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1090" cy="70" r="180" fill="none" stroke="#0f766e" stroke-opacity=".09" stroke-width="54"/>
  <text x="72" y="86" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="24" font-weight="700" letter-spacing="5">PRACTICAL GUIDE</text>
  <text x="72" y="174" fill="#123b44" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">5指標・100点で決める</text>
  <text x="72" y="238" fill="#123b44" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="46" font-weight="700">インバウンドの優先市場</text>
  <text x="72" y="370" fill="#0f766e" font-family="Segoe UI, sans-serif" font-size="96" font-weight="800">5 × 100</text>
  <text x="76" y="420" fill="#315f65" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="25">市場規模・価値・成長・交通・適合性</text>
  <g transform="translate(650 145)" filter="url(#shadow)">
    <rect width="455" height="390" rx="26" fill="#fff" fill-opacity=".96"/>
    <line x1="64" y1="312" x2="407" y2="312" stroke="#94a3b8" stroke-width="2"/>
    <line x1="64" y1="312" x2="64" y2="54" stroke="#94a3b8" stroke-width="2"/>
    <text x="224" y="354" fill="#64748b" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" text-anchor="middle">市場規模・アクセス</text>
    <text x="-184" y="24" fill="#64748b" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" text-anchor="middle" transform="rotate(-90)">消費価値・適合性</text>
    <circle cx="310" cy="118" r="43" fill="#0f766e" fill-opacity=".9"/>
    <circle cx="241" cy="168" r="31" fill="#0891b2" fill-opacity=".86"/>
    <circle cx="343" cy="235" r="37" fill="#14b8a6" fill-opacity=".82"/>
    <circle cx="151" cy="105" r="25" fill="#2563eb" fill-opacity=".78"/>
    <circle cx="125" cy="242" r="20" fill="#7c3aed" fill-opacity=".72"/>
    <text x="310" y="124" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="16" font-weight="700" text-anchor="middle">主力</text>
    <text x="241" y="174" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="14" font-weight="700" text-anchor="middle">育成</text>
    <text x="125" y="248" fill="#fff" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="13" font-weight="700" text-anchor="middle">実験</text>
  </g>
  <g transform="translate(72 492)">
    <rect width="104" height="46" rx="23" fill="#0f766e" fill-opacity=".09"/><text x="52" y="30" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">規模</text>
    <rect x="116" width="104" height="46" rx="23" fill="#0f766e" fill-opacity=".09"/><text x="168" y="30" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">価値</text>
    <rect x="232" width="104" height="46" rx="23" fill="#0f766e" fill-opacity=".09"/><text x="284" y="30" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">成長</text>
    <rect x="348" width="104" height="46" rx="23" fill="#0f766e" fill-opacity=".09"/><text x="400" y="30" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">交通</text>
    <rect x="464" width="104" height="46" rx="23" fill="#0f766e" fill-opacity=".09"/><text x="516" y="30" fill="#0f3d3e" font-family="Yu Gothic UI, Meiryo, sans-serif" font-size="18" font-weight="700" text-anchor="middle">適合</text>
  </g>
</svg>
